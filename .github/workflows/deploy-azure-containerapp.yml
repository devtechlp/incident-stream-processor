# Manual deploy only — not triggered on push. Use deploy-local.ps1 for day-to-day deploys.
# To run from GitHub: Actions tab → "Deploy incident-stream-processor" → Run workflow
#
# GitHub repo secrets (if using this workflow later):
#   GITHUB_WEBHOOK_SECRET — same secret you set on the GitHub org webhook (deploy-local.ps1 generates one)
#   INTERNAL_API_KEY      — optional; only for manual PATCH /api/incidents/:id/status (not Copilot flow)

name: Deploy incident-stream-processor to Azure Container Apps

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  APP_NAME: incident-stream-proc
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  ACR_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}
  CONTAINERAPPS_ENVIRONMENT: ${{ secrets.AZURE_CONTAINERAPPS_ENVIRONMENT }}
  ACR_USERNAME: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
  ACR_PASSWORD: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}
  MONGO_URI: ${{ secrets.MONGO_URI }}
  MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
  MONGO_COLLECTION: ${{ secrets.MONGO_COLLECTION }}
  FUNCTION_APP_URL: ${{ secrets.FUNCTION_APP_URL }}
  FUNCTION_APP_KEY: ${{ secrets.FUNCTION_APP_KEY }}
  INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
  GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
  DYNATRACE_WEBHOOK_TOKEN: ${{ secrets.DYNATRACE_WEBHOOK_TOKEN }}
  DT_ENV_URL: ${{ secrets.DT_ENV_URL }}
  DT_CLIENT_ID: ${{ secrets.DT_CLIENT_ID }}
  DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
  CHECKPOINT_STORAGE_CONNECTION_STRING: ${{ secrets.CHECKPOINT_STORAGE_CONNECTION_STRING }}
  CHECKPOINT_CONTAINER: ${{ secrets.CHECKPOINT_CONTAINER }}
  CHECKPOINT_BLOB: ${{ secrets.CHECKPOINT_BLOB }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push Docker image
        run: |
          az acr build --registry "$ACR_NAME" --image "$APP_NAME:${{ github.sha }}" .

      - name: Create or Update Container App
        run: |
          IMAGE="$ACR_NAME.azurecr.io/$APP_NAME:${{ github.sha }}"
          EXISTS=$(az containerapp show --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" --query name -o tsv 2>/dev/null || true)

          if [ -z "$EXISTS" ]; then
            echo "Creating Container App $APP_NAME..."
            az containerapp create \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$CONTAINERAPPS_ENVIRONMENT" \
              --image "$IMAGE" \
              --min-replicas 1 \
              --max-replicas 1 \
              --ingress external \
              --target-port 3000 \
              --registry-server "$ACR_NAME.azurecr.io" \
              --registry-username "$ACR_USERNAME" \
              --registry-password "$ACR_PASSWORD" \
              --env-vars \
                "MONGO_URI=$MONGO_URI" \
                "MONGO_DB_NAME=$MONGO_DB_NAME" \
                "MONGO_COLLECTION=$MONGO_COLLECTION" \
                "FUNCTION_APP_URL=$FUNCTION_APP_URL" \
                "FUNCTION_APP_KEY=$FUNCTION_APP_KEY" \
                "INTERNAL_API_KEY=$INTERNAL_API_KEY" \
                "GITHUB_WEBHOOK_SECRET=$GITHUB_WEBHOOK_SECRET" \
                "DYNATRACE_WEBHOOK_TOKEN=$DYNATRACE_WEBHOOK_TOKEN" \
                "DT_ENV_URL=$DT_ENV_URL" \
                "DT_CLIENT_ID=$DT_CLIENT_ID" \
                "DT_CLIENT_SECRET=$DT_CLIENT_SECRET" \
                "CHECKPOINT_STORAGE_CONNECTION_STRING=$CHECKPOINT_STORAGE_CONNECTION_STRING" \
                "CHECKPOINT_CONTAINER=$CHECKPOINT_CONTAINER" \
                "CHECKPOINT_BLOB=$CHECKPOINT_BLOB"
          else
            echo "Updating Container App $APP_NAME..."
            az containerapp update \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$IMAGE" \
              --set-env-vars \
                "MONGO_URI=$MONGO_URI" \
                "MONGO_DB_NAME=$MONGO_DB_NAME" \
                "MONGO_COLLECTION=$MONGO_COLLECTION" \
                "FUNCTION_APP_URL=$FUNCTION_APP_URL" \
                "FUNCTION_APP_KEY=$FUNCTION_APP_KEY" \
                "INTERNAL_API_KEY=$INTERNAL_API_KEY" \
                "GITHUB_WEBHOOK_SECRET=$GITHUB_WEBHOOK_SECRET" \
                "DYNATRACE_WEBHOOK_TOKEN=$DYNATRACE_WEBHOOK_TOKEN" \
                "DT_ENV_URL=$DT_ENV_URL" \
                "DT_CLIENT_ID=$DT_CLIENT_ID" \
                "DT_CLIENT_SECRET=$DT_CLIENT_SECRET" \
                "CHECKPOINT_STORAGE_CONNECTION_STRING=$CHECKPOINT_STORAGE_CONNECTION_STRING" \
                "CHECKPOINT_CONTAINER=$CHECKPOINT_CONTAINER" \
                "CHECKPOINT_BLOB=$CHECKPOINT_BLOB"

            az containerapp ingress enable \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --type external \
              --target-port 3000

            az containerapp registry set \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --server "$ACR_NAME.azurecr.io" \
              --username "$ACR_USERNAME" \
              --password "$ACR_PASSWORD"
          fi
